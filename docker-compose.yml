services:
  postgres:
    image: postgres:16-alpine
    container_name: djs-template-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: insecurepassword
      POSTGRES_DB: djs-template
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: djs-template-redis
    command: redis-server --requirepass insecurepassword
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  baitin:
    platform: linux/amd64
    image: "baitin"
    environment:
      DATABASE_URL: postgresql://baitin:baitin@postgres:5435/baitin
      REDIS_URL: redis://:insecurepassword@redis:6380
      TOKEN: ${TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      GUILD_ID: ${GUILD_ID}
      NODE_ENV: production

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
