services:
  postgres:
    image: postgres:16-alpine
    container_name: djs-template-postgres
    environment:
      POSTGRES_USER: baitin
      POSTGRES_PASSWORD: insecurepassword
      POSTGRES_DB: baitin
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baitin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: djs-template-redis
    command: redis-server --requirepass insecurepassword
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "insecurepassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  baitin:
    platform: linux/amd64
    image: "baitin"
    ports:
      - "5101:3000"
    environment:
      DATABASE_URL: postgresql://baitin:insecurepassword@postgres:5432/baitin
      REDIS_URL: redis://:insecurepassword@redis:6379
      TOKEN: ${TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      GUILD_ID: ${GUILD_ID}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  baitin-web:
    platform: linux/amd64
    image: "baitin-web"
    ports:
      - "5100:3000"
    environment:
      BOT_API_URL: "http://fishing.bnhm.dev"
      NEXT_PUBLIC_DISCORD_INVITE_URL: "https://discord.com/oauth2/authorize?client_id=1483033234689232977&permissions=1513962695871&integration_type=0&scope=bot+applications.commands"
      NODE_ENV: production
    depends_on:
      baitin:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
